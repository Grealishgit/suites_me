{% extends 'logins.html' %}
{% load static %}

{% block content %}
<style>
        /* Main Content */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 2.5rem;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #000;
            font-weight: 700;
            line-height: 1.2;
        }

        .message {
            font-size: 1.4rem;
            color: #333;
            margin-bottom: 2rem;
        }

        /* Footer Buttons */
        .footer-buttons {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 1.5rem 1.5rem;
            background: #f5f5f5;
            padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
        }

        .footer-btn {
            padding: 1rem 2.5rem;
            background: #000;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .footer-btn:hover {
            background: #333;
        }

        /* Mobile specific styles */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

        }

    </style>

    <!-- Main Content -->
    <div class="container">
        <h1>Thank you for being a customer</h1>
        <p class="message">Your money is on its way</p>
    </div>


    <script>
        function resetProcess() {
            {
                // Redirect to start or reset the process
                window.location.href = '/';
            }
        }

    </script>
{% endblock %}

{% block footer_left %}
<button type="button" class="reset-button" onclick="resetProcess()">Reset</button>
{% endblock %}
